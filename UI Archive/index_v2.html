<!doctype html>
<html lang="en">
<head>
<meta charset="UTF-8"/>
<meta name="viewport" content="width=device-width,initial-scale=1.0"/>
<title>Macro Signal Console</title>
<link rel="preconnect" href="https://fonts.googleapis.com"/>
<link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
<link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
<style>
:root{
  --bg:#03080f;--s0:#060d18;--s1:#0a1624;--s2:#0e1e30;--s3:#15273d;
  --border:rgba(255,255,255,0.06);--border2:rgba(255,255,255,0.10);
  --text:#e8f0fe;--muted:#6a8aad;--muted2:#8aaed0;
  --accent:#00d4ff;--accent2:#0098cc;
  --green:#00e5a0;--rose:#ff4d6d;--amber:#ffb84d;--purple:#b47aff;
  --r:14px;--r2:10px;--r3:6px;
  --font-display:'Syne',sans-serif;--font-body:'Inter',sans-serif;--font-mono:'DM Mono',monospace;
}
*,*::before,*::after{box-sizing:border-box;margin:0;padding:0}
html{scroll-behavior:smooth}
body{background:var(--bg);color:var(--text);font-family:var(--font-body);font-size:14px;line-height:1.6;overflow-x:hidden}
body::before{content:'';position:fixed;inset:0;background-image:linear-gradient(rgba(0,212,255,.012) 1px,transparent 1px),linear-gradient(90deg,rgba(0,212,255,.012) 1px,transparent 1px);background-size:48px 48px;pointer-events:none;z-index:0}

/* ── NAV ── */
#nav{position:sticky;top:0;z-index:100;background:rgba(3,8,15,.92);backdrop-filter:blur(16px);border-bottom:1px solid var(--border);height:46px;display:flex;align-items:center;padding:0 24px;gap:0;overflow-x:auto;scrollbar-width:none}
#nav::-webkit-scrollbar{display:none}
.nav-brand{font-family:var(--font-display);font-size:12px;font-weight:800;color:var(--accent);letter-spacing:.06em;margin-right:14px;padding-right:14px;border-right:1px solid var(--border2);flex-shrink:0}
#nav a{color:var(--muted);text-decoration:none;font-size:11px;font-weight:500;letter-spacing:.07em;text-transform:uppercase;padding:0 11px;height:46px;display:flex;align-items:center;white-space:nowrap;border-bottom:2px solid transparent;transition:color .2s,border-color .2s}
#nav a:hover{color:var(--text);border-color:var(--accent)}
.nav-end{margin-left:auto;display:flex;align-items:center;gap:8px;padding-left:12px;flex-shrink:0;font-family:var(--font-mono);font-size:11px}
.msi-dot{width:7px;height:7px;border-radius:50%;display:inline-block;animation:pulse 2s infinite}
@keyframes pulse{0%,100%{opacity:1}50%{opacity:.3}}

/* ── LAYOUT ── */
.page{max-width:1440px;margin:0 auto;padding:24px 24px 80px;position:relative;z-index:1}
.stack{display:flex;flex-direction:column;gap:20px}
.two-col{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:20px}
.three-col{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:20px}

/* ── PANELS ── */
.panel{background:var(--s1);border:1px solid var(--border);border-radius:var(--r);padding:22px;position:relative;overflow:hidden}
.panel::before{content:'';position:absolute;top:0;left:0;right:0;height:1px;background:linear-gradient(90deg,transparent,rgba(0,212,255,.22),transparent)}
.panel-dark{background:var(--s0)}

/* ── SECTION HEADERS (collapsible) ── */
.sh{display:flex;justify-content:space-between;align-items:flex-start;gap:10px;flex-wrap:wrap;margin-bottom:18px}
.sh-title{font-family:var(--font-display);font-size:18px;font-weight:700;letter-spacing:-.01em;cursor:pointer;display:flex;align-items:center;gap:7px;user-select:none;transition:color .2s}
.sh-title:hover{color:var(--accent)}
.sh-chevron{font-size:10px;color:var(--muted);transition:transform .22s;flex-shrink:0}
.sh-chevron.open{transform:rotate(180deg)}
.sh-sub{font-size:12px;color:var(--muted);margin-top:3px;max-width:580px;line-height:1.5}
.chip{display:inline-flex;align-items:center;border:1px solid var(--border2);border-radius:999px;padding:3px 10px;font-size:10px;font-weight:500;color:var(--muted2);white-space:nowrap;flex-shrink:0}
.chip.accent{border-color:var(--accent);color:var(--accent)}
.collapsible{overflow:hidden}
.collapsible.collapsed{display:none}

/* ── HERO ── */
.hero{padding:32px 32px 26px}
.hero-eyebrow{display:flex;align-items:center;gap:10px;margin-bottom:16px}
.badge-live{display:inline-flex;align-items:center;gap:5px;background:rgba(0,212,255,.07);border:1px solid rgba(0,212,255,.2);border-radius:999px;padding:3px 10px;font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:.1em;text-transform:uppercase}
.badge-date{font-family:var(--font-mono);font-size:11px;color:var(--muted)}
.hero-title{font-family:var(--font-display);font-size:clamp(26px,3.2vw,46px);font-weight:800;line-height:.94;letter-spacing:-.03em;max-width:740px;margin-bottom:16px}
.hero-title span{color:var(--accent)}
.hero-narrative{font-size:13px;line-height:1.75;color:var(--muted2);max-width:860px;margin-bottom:22px;border-left:2px solid var(--accent2);padding-left:13px}

/* ── HERO STATS ── */
.hero-stats{display:grid;grid-template-columns:auto 1fr;gap:12px;align-items:start}
.stress-ring-wrap{display:flex;align-items:center;gap:14px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:13px 16px;flex-shrink:0}
.stress-ring{position:relative;width:66px;height:66px;flex-shrink:0}
.stress-ring svg{transform:rotate(-90deg)}
.ring-bg{fill:none;stroke:var(--s3);stroke-width:6}
.ring-fill{fill:none;stroke-width:6;stroke-linecap:round}
.ring-label{position:absolute;inset:0;display:flex;flex-direction:column;align-items:center;justify-content:center}
.ring-num{font-family:var(--font-mono);font-size:16px;font-weight:500}
.ring-text{font-size:8px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase}
.ring-delta{font-family:var(--font-mono);font-size:9px;margin-top:1px}
.stat-row{display:grid;grid-template-columns:repeat(4,minmax(0,1fr));gap:9px}
.stat-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;border-top-width:2px}
.stat-label{font-size:9px;font-weight:600;letter-spacing:.1em;text-transform:uppercase;color:var(--muted)}
.stat-value{font-family:var(--font-mono);font-size:20px;font-weight:500;line-height:1.2;margin:5px 0 3px}
.stat-note{font-size:10px;color:var(--muted);line-height:1.4}
#copy-btn{display:inline-flex;align-items:center;gap:6px;background:transparent;border:1px solid var(--border2);border-radius:999px;padding:6px 13px;color:var(--muted2);font-size:11px;font-weight:500;cursor:pointer;transition:all .2s;margin-top:16px}
#copy-btn:hover{border-color:var(--accent);color:var(--accent)}
#copy-btn.copied{border-color:var(--green);color:var(--green)}
.disclaimer{background:rgba(255,184,77,.04);border:1px solid rgba(255,184,77,.11);border-radius:var(--r2);padding:11px 14px;font-size:11px;color:rgba(255,184,77,.6);line-height:1.55;margin-top:16px}

/* ── THEMES ── */
.theme-grid{display:grid;grid-template-columns:repeat(5,minmax(0,1fr));gap:9px}
.theme-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:12px}
.theme-dir{display:inline-block;border-radius:4px;padding:2px 7px;font-family:var(--font-mono);font-size:9px;letter-spacing:.08em;text-transform:uppercase;margin-bottom:6px}
.td-shock{background:rgba(255,77,109,.09);border:1px solid rgba(255,77,109,.2);color:var(--rose)}
.td-tight{background:rgba(255,184,77,.09);border:1px solid rgba(255,184,77,.2);color:var(--amber)}
.td-lead{background:rgba(0,229,160,.08);border:1px solid rgba(0,229,160,.2);color:var(--green)}
.td-def{background:rgba(180,122,255,.08);border:1px solid rgba(180,122,255,.2);color:var(--purple)}
.td-watch{background:rgba(106,138,173,.08);border:1px solid rgba(106,138,173,.18);color:var(--muted2)}
.theme-name{font-size:12px;font-weight:500;line-height:1.35;margin-bottom:6px}
.theme-impact{font-size:11px;color:var(--muted);line-height:1.4;margin-bottom:8px}
.bar-track{height:3px;background:var(--s3);border-radius:999px;overflow:hidden}
.bar-fill{height:100%;border-radius:999px}
.bf-rose{background:var(--rose)}.bf-amber{background:var(--amber)}.bf-green{background:var(--green)}.bf-purple{background:var(--purple)}.bf-muted{background:var(--muted)}

/* ── RATE CURVE ── */
.chart-wrap{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:16px}
.chart-legend{display:flex;gap:16px;margin-bottom:9px}
.legend-item{display:flex;align-items:center;gap:5px;font-size:11px;color:var(--muted2)}
.legend-line{width:16px;height:2px;border-radius:1px}
canvas#curveChart{max-height:190px}
.curve-read{background:var(--s0);border:1px solid var(--border);border-radius:var(--r2);padding:11px 14px;font-size:12px;line-height:1.6;color:var(--muted2);margin-top:12px}

/* ── CROSS-MARKET TABLE ── */
.table-wrap{overflow-x:auto}
table{width:100%;border-collapse:collapse;font-size:12px}
thead tr{border-bottom:1px solid var(--border2)}
th{padding:8px 11px;text-align:left;font-size:9px;font-weight:600;letter-spacing:.08em;text-transform:uppercase;color:var(--muted);white-space:nowrap}
td{padding:9px 11px;border-bottom:1px solid var(--border)}
tbody tr.cm-main{cursor:pointer}
tbody tr.cm-main:hover td{background:rgba(255,255,255,.018)}
.mkt-name{font-weight:500;font-size:13px}
.mkt-short{color:var(--muted2);font-size:11px;max-width:180px;overflow:hidden;text-overflow:ellipsis;white-space:nowrap}
.move-val{font-family:var(--font-mono);font-weight:500}
.trend-pill{display:inline-block;border-radius:4px;padding:2px 6px;font-size:9px;font-weight:600}
.t-up{background:rgba(255,77,109,.12);color:var(--rose)}
.t-down{background:rgba(0,229,160,.1);color:var(--green)}
.t-neut{background:rgba(106,138,173,.1);color:var(--muted2)}
.heat-bar{display:flex;align-items:center;gap:6px;min-width:80px}
.heat-track{flex:1;height:3px;background:var(--s3);border-radius:999px;overflow:hidden}
.heat-fill{height:100%;border-radius:999px}
.h-crit{background:var(--rose)}.h-high{background:var(--amber)}.h-mid{background:var(--accent)}.h-low{background:var(--muted)}
.heat-num{font-family:var(--font-mono);font-size:10px;color:var(--muted);width:20px}
.rbadge{display:inline-block;border-radius:4px;padding:2px 7px;font-size:9px;font-weight:700}
.rb-high{background:rgba(255,77,109,.12);color:var(--rose)}
.rb-elev{background:rgba(255,184,77,.12);color:var(--amber)}
.rb-mod{background:rgba(180,122,255,.12);color:var(--purple)}
.rb-watch{background:rgba(106,138,173,.12);color:var(--muted2)}
.expand-icon{color:var(--muted);font-size:10px;margin-left:3px;display:inline-block;transition:transform .2s}
tr.expanded .expand-icon{transform:rotate(90deg)}
.cm-detail td{padding:0;border-bottom:1px solid var(--border)}
.cm-detail-inner{padding:9px 11px 12px 32px;background:var(--s0);font-size:12px;color:var(--muted2);line-height:1.6;display:none}
.cm-detail-inner.open{display:block}

/* ── FLOWS ── */
.flow-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.flow-row:last-child{border-bottom:none}
.flow-dir-badge{border-radius:5px;padding:3px 9px;font-size:10px;font-weight:700;letter-spacing:.04em;min-width:64px;text-align:center;flex-shrink:0}
.fd-in{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.22)}
.fd-out{background:rgba(255,77,109,.1);color:var(--rose);border:1px solid rgba(255,77,109,.2)}
.fd-flat{background:rgba(106,138,173,.1);color:var(--muted2);border:1px solid var(--border)}
.flow-body{flex:1}
.flow-asset{font-size:13px;font-weight:500;margin-bottom:2px}
.flow-note{font-size:11px;color:var(--muted);line-height:1.45}
.flow-size{font-family:var(--font-mono);font-size:13px;font-weight:500;min-width:62px;text-align:right;flex-shrink:0;padding-top:1px}
.flow-sig-high{color:var(--rose)}.flow-sig-med{color:var(--amber)}.flow-sig-low{color:var(--muted)}
.flows-read{background:var(--s0);border:1px solid var(--border);border-radius:var(--r2);padding:12px 14px;font-size:12px;line-height:1.65;color:var(--muted2);margin-top:14px}
.flow-summary-bar{display:flex;gap:8px;margin-bottom:14px;flex-wrap:wrap}
.fsb-item{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:8px 12px;font-size:11px;display:flex;align-items:center;gap:6px}
.fsb-val{font-family:var(--font-mono);font-size:14px;font-weight:500}

/* ── INDICATORS ── */
.ind-2col{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:12px}
.ind-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:15px}
.ind-hdr{display:flex;justify-content:space-between;align-items:flex-start;margin-bottom:12px}
.ind-name{font-size:13px;font-weight:500;line-height:1.35}
.ind-acronym{font-family:var(--font-mono);font-size:9px;color:var(--muted);margin-top:2px;letter-spacing:.08em}
.ind-score{font-family:var(--font-mono);font-size:28px;font-weight:500;line-height:1}
.ind-score-sub{font-size:9px;color:var(--muted);text-transform:uppercase;letter-spacing:.06em;margin-top:1px;text-align:right}
.ind-gauge-row{display:flex;align-items:center;gap:7px;margin-bottom:4px}
.ind-glbl{font-size:11px;color:var(--muted2);width:130px;flex-shrink:0;line-height:1.3}
.ind-gtrack{flex:1;height:3px;background:var(--s3);border-radius:999px;overflow:hidden}
.ind-gfill{height:100%;border-radius:999px}
.ind-gval{font-family:var(--font-mono);font-size:10px;color:var(--muted);width:44px;text-align:right}
.ind-formula{font-family:var(--font-mono);font-size:10px;color:var(--muted);background:var(--s0);border:1px solid var(--border);border-radius:var(--r3);padding:6px 9px;margin-top:9px;line-height:1.65}
.regime-banner{display:flex;align-items:center;gap:12px;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:12px 16px;margin-bottom:14px;flex-wrap:wrap}
.regime-pill{display:inline-flex;align-items:center;gap:6px;border-radius:999px;padding:4px 13px;font-size:12px;font-weight:600;border:1px solid;flex-shrink:0}
.regime-dot{width:6px;height:6px;border-radius:50%;display:inline-block}
.regime-desc{font-size:12px;color:var(--muted2);line-height:1.5}
.ind-state-pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:3px 9px;font-size:10px;font-weight:600;border:1px solid;margin-top:9px}
.isp-active{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.22);color:var(--green)}
.isp-watch{background:rgba(255,184,77,.08);border-color:rgba(255,184,77,.2);color:var(--amber)}
.isp-fire{background:rgba(255,77,109,.08);border-color:rgba(255,77,109,.2);color:var(--rose)}
.isp-off{background:rgba(106,138,173,.07);border-color:var(--border);color:var(--muted)}
.sdot{width:5px;height:5px;border-radius:50%;display:inline-block}
.sd-g{background:var(--green)}.sd-a{background:var(--amber)}.sd-r{background:var(--rose)}.sd-n{background:var(--muted)}

/* ── SIGNAL BOARD ── */
.sigboard-row{display:flex;align-items:flex-start;gap:10px;padding:10px 0;border-bottom:1px solid var(--border)}
.sigboard-row:last-child{border-bottom:none}
.sig-num{font-family:var(--font-mono);font-size:10px;color:var(--muted);width:18px;flex-shrink:0;padding-top:2px}
.sig-body{flex:1}
.sig-title{font-size:13px;font-weight:500;margin-bottom:2px}
.sig-from{font-size:10px;letter-spacing:.06em;text-transform:uppercase;color:var(--muted);margin-bottom:5px}
.sig-logic{font-size:12px;color:var(--muted2);line-height:1.55;margin-bottom:4px}
.sig-levels{font-family:var(--font-mono);font-size:10px;color:var(--muted);line-height:1.6}
.sig-tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:5px}
.sig-tag{font-size:10px;padding:1px 6px;border-radius:4px;background:var(--s3);color:var(--muted2)}
.sig-state{flex-shrink:0;padding-top:1px}
.state-pill{display:inline-flex;align-items:center;gap:4px;border-radius:999px;padding:4px 10px;font-size:10px;font-weight:600;border:1px solid}
.sp-active{background:rgba(0,229,160,.08);border-color:rgba(0,229,160,.22);color:var(--green)}
.sp-watch{background:rgba(255,184,77,.08);border-color:rgba(255,184,77,.2);color:var(--amber)}
.sp-fire{background:rgba(255,77,109,.08);border-color:rgba(255,77,109,.2);color:var(--rose)}
.sp-off{background:rgba(106,138,173,.07);border-color:var(--border);color:var(--muted)}

/* ── DRIVERS ── */
.driver-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:13px;margin-bottom:9px}
.driver-card:last-child{margin-bottom:0}
.dh{display:flex;justify-content:space-between;gap:10px;align-items:flex-start}
.dh-name{font-size:13px;font-weight:500;line-height:1.35}
.dh-meta{font-size:11px;color:var(--muted);margin-top:3px}
.dh-score{font-family:var(--font-mono);font-size:24px;color:var(--accent);line-height:1}
.conf-badge{border-radius:999px;padding:2px 8px;font-size:9px;font-weight:600;display:inline-block}
.conf-high{background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2)}
.conf-med{background:rgba(255,184,77,.1);color:var(--amber);border:1px solid rgba(255,184,77,.2)}
.conf-low{background:rgba(106,138,173,.1);color:var(--muted2);border:1px solid var(--border)}
.driver-detail{font-size:12px;color:var(--muted2);margin-top:8px;line-height:1.55}
.prob-row{display:flex;justify-content:space-between;align-items:center;margin-top:9px;font-size:11px}
.prob-val{font-family:var(--font-mono);font-weight:500}

/* ── SECTOR + RISK ── */
.sector-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:6px}
.sector-tile{border-radius:var(--r2);padding:10px 12px;border:1px solid transparent}
.sh-critical{background:rgba(255,77,109,.15);border-color:rgba(255,77,109,.27)}
.sh-high{background:rgba(255,184,77,.12);border-color:rgba(255,184,77,.23)}
.sh-mid{background:rgba(0,212,255,.09);border-color:rgba(0,212,255,.17)}
.sh-low{background:rgba(106,138,173,.07);border-color:rgba(106,138,173,.13)}
.sec-heat-num{font-family:var(--font-mono);font-size:18px;font-weight:500;float:right;line-height:1}
.sec-name{font-size:12px;font-weight:500}
.sec-trend{font-size:11px;margin-top:1px}
.sec-driver{font-size:10px;color:rgba(255,255,255,.38);margin-top:2px}
.risk-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:11px 13px;margin-bottom:7px}
.risk-card:last-child{margin-bottom:0}
.rh{display:flex;justify-content:space-between;gap:8px;align-items:flex-start}
.risk-title{font-size:13px;font-weight:500;line-height:1.35}
.risk-desc{font-size:12px;color:var(--muted2);margin-top:6px;line-height:1.55}

/* ── SCENARIOS ── */
.scenario-prob-bar{display:flex;height:7px;border-radius:999px;overflow:hidden;margin-bottom:14px;gap:2px}
.spb-seg{height:100%}
.spb-bear{background:var(--rose)}.spb-base{background:var(--accent)}.spb-bull{background:var(--green)}
.spb-labels{display:flex;justify-content:space-between;font-family:var(--font-mono);font-size:10px;color:var(--muted);margin-bottom:13px}
.scenario-grid{display:grid;grid-template-columns:repeat(3,minmax(0,1fr));gap:12px}
.scenario-card{border-radius:var(--r2);padding:15px;border:1px solid transparent}
.sc-bear{background:rgba(255,77,109,.07);border-color:rgba(255,77,109,.17)}
.sc-base{background:rgba(0,212,255,.05);border-color:rgba(0,212,255,.14)}
.sc-bull{background:rgba(0,229,160,.05);border-color:rgba(0,229,160,.15)}
.sc-label{font-family:var(--font-mono);font-size:9px;font-weight:500;letter-spacing:.12em;text-transform:uppercase;margin-bottom:6px}
.sc-bear .sc-label{color:var(--rose)}.sc-base .sc-label{color:var(--accent)}.sc-bull .sc-label{color:var(--green)}
.sc-title{font-size:13px;font-weight:500;margin-bottom:8px;line-height:1.3}
.sc-prob{font-family:var(--font-mono);font-size:28px;font-weight:500;line-height:1}
.sc-bear .sc-prob{color:var(--rose)}.sc-base .sc-prob{color:var(--accent)}.sc-bull .sc-prob{color:var(--green)}
.sc-prob-lbl{font-size:9px;color:var(--muted);letter-spacing:.06em;text-transform:uppercase;margin-top:2px;margin-bottom:9px}
.sc-outcome{font-size:12px;color:var(--muted2);line-height:1.55;margin-bottom:9px}
.sc-trigger{font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px;line-height:1.45}
.sc-trigger strong{color:var(--text)}

/* ── TIMELINE + WATCHPOINTS ── */
.timeline{display:flex;flex-direction:column}
.tl-item{display:flex;gap:12px}
.tl-rail{display:flex;flex-direction:column;align-items:center;flex-shrink:0;width:13px}
.tl-dot{width:8px;height:8px;border-radius:50%;background:var(--accent);flex-shrink:0;margin-top:4px;border:2px solid var(--s1);outline:2px solid var(--accent)}
.tl-line{flex:1;width:1px;background:var(--border2);margin:3px 0;min-height:14px}
.tl-time{font-family:var(--font-mono);font-size:10px;color:var(--accent);letter-spacing:.07em;text-transform:uppercase}
.tl-head{font-size:12px;font-weight:500;margin-top:3px;line-height:1.4}
.tl-effect{font-size:11px;color:var(--muted);margin-top:3px;margin-bottom:13px}
.wp-list{display:flex;flex-direction:column;gap:6px}
.wp-item{display:flex;gap:10px;align-items:flex-start;background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px}
.wp-date{font-family:var(--font-mono);font-size:11px;color:var(--accent);width:40px;flex-shrink:0;padding-top:1px}
.wp-event{font-size:12px;font-weight:500;flex:1;line-height:1.4}
.wp-tag{border-radius:4px;padding:2px 6px;font-size:9px;font-weight:600;flex-shrink:0}
.wt-high{background:rgba(255,77,109,.12);color:var(--rose)}
.wt-med{background:rgba(255,184,77,.12);color:var(--amber)}

/* ── STRATEGY ── */
.strategy-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:9px}
.strat-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:13px}
.strat-head{display:flex;justify-content:space-between;gap:8px;align-items:flex-start;margin-bottom:8px}
.strat-title{font-size:13px;font-weight:500;line-height:1.35}
.strat-body{font-size:12px;color:var(--muted2);line-height:1.55;margin-bottom:9px}
.strat-trigger{font-size:11px;color:var(--muted);border-top:1px solid var(--border);padding-top:8px}
.strat-trigger strong{color:var(--accent)}

/* ── SOURCES ── */
.src-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:7px}
.src-card{background:var(--s2);border:1px solid var(--border);border-radius:var(--r2);padding:9px 12px;display:flex;justify-content:space-between;align-items:flex-start;gap:8px}
.src-name{font-size:12px;font-weight:500}
.src-type{font-size:10px;color:var(--muted);margin-top:2px}
.src-link{color:var(--accent);text-decoration:none;font-family:var(--font-mono);font-size:9px;border:1px solid rgba(0,212,255,.17);padding:2px 6px;border-radius:4px;flex-shrink:0;transition:background .2s}
.src-link:hover{background:rgba(0,212,255,.08)}

/* ── MISC ── */
.tags{display:flex;gap:4px;flex-wrap:wrap;margin-top:7px}
.tag{border:1px solid var(--border2);border-radius:4px;padding:1px 6px;font-size:10px;color:var(--muted)}
.check-grid{display:grid;grid-template-columns:repeat(2,minmax(0,1fr));gap:5px}
.check-item{display:flex;align-items:center;gap:6px;font-size:11px;color:var(--muted2)}
.ci{width:12px;height:12px;border-radius:50%;display:flex;align-items:center;justify-content:center;font-size:8px;flex-shrink:0}
.ci-ok{background:rgba(0,229,160,.15);color:var(--green)}.ci-bad{background:rgba(255,77,109,.15);color:var(--rose)}
.fade-in{animation:fadeIn .45s ease both}
@keyframes fadeIn{from{opacity:0;transform:translateY(5px)}to{opacity:1;transform:none}}

/* ── RESPONSIVE ── */
@media(max-width:1100px){.theme-grid{grid-template-columns:repeat(3,minmax(0,1fr))}.scenario-grid{grid-template-columns:1fr 1fr}.stat-row{grid-template-columns:repeat(2,minmax(0,1fr))}.ind-2col{grid-template-columns:1fr}}
@media(max-width:768px){.page{padding:12px}.hero{padding:18px}.two-col,.three-col{grid-template-columns:1fr}.theme-grid,.sector-grid,.scenario-grid,.strategy-grid,.src-grid{grid-template-columns:1fr 1fr}.stat-row{grid-template-columns:1fr 1fr}.hero-stats{grid-template-columns:1fr}.ind-2col{grid-template-columns:1fr}}
@media(max-width:480px){.theme-grid,.sector-grid,.scenario-grid,.strategy-grid,.src-grid,.ind-2col{grid-template-columns:1fr}.stat-row{grid-template-columns:1fr}}

<script>
/* ── UTILS ── */
const esc=s=>String(s??'').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const clamp=v=>Math.max(0,Math.min(100,Number(v)||0));
const norm=(v,lo,hi)=>Math.round(Math.max(0,Math.min(100,((v-lo)/(hi-lo))*100)));

/* ── COLOR HELPERS ── */
function stressColor(v){if(v>=85)return'var(--rose)';if(v>=70)return'var(--amber)';if(v>=55)return'var(--accent)';return'var(--green)'}
function probColor(p){if(p>=80)return'var(--green)';if(p>=65)return'var(--accent)';if(p>=50)return'var(--amber)';return'var(--muted2)'}
function heatClass(h){h=Number(h);if(h>=90)return'h-crit';if(h>=75)return'h-high';if(h>=60)return'h-mid';return'h-low'}
function sectorClass(h){h=Number(h);if(h>=88)return'sh-critical';if(h>=72)return'sh-high';if(h>=58)return'sh-mid';return'sh-low'}
function sectorColor(h){h=Number(h);if(h>=88)return'var(--rose)';if(h>=72)return'var(--amber)';if(h>=58)return'var(--accent)';return'var(--muted2)'}
function riskBadge(lvl){const m={High:'rb-high',Elevated:'rb-elev',Medium:'rb-mod',Moderate:'rb-mod',Watch:'rb-watch'};return`<span class="rbadge ${m[lvl]||'rb-watch'}">${esc(lvl)}</span>`}
function confBadge(c){const m={High:'conf-high',Medium:'conf-med'};return`<span class="conf-badge ${m[c]||'conf-low'}">${esc(c||'Low')}</span>`}
function trendClass(t){if(!t)return't-neut';const l=t.toLowerCase();if(l.includes('higher')||l.includes('surge')||l.includes('sharp')||l.includes('↑'))return't-up';if(l.includes('lower')||l.includes('lag')||l.includes('↓'))return't-down';return't-neut'}
function dirClass(dir){
  const d=(dir||'').toLowerCase();
  if(d==='shock'||d.includes('risk-off')||d.includes('credit')||d.includes('compress')||d.includes('squeeze')||d.includes('vol'))return'shock';
  if(d.includes('tight')||d.includes('macro')||d.includes('data')||d.includes('stagflat')||d.includes('haven'))return'tight';
  if(d==='leadership'||d.includes('risk-on')||d.includes('easing')||d.includes('earning'))return'lead';
  if(d.includes('def')||d.includes('usd')||d.includes('fx')||d.includes('rotation'))return'def';
  return'watch';
}
function barFillClass(dir){
  const d=(dir||'').toLowerCase();
  if(d==='shock'||d.includes('risk-off')||d.includes('credit')||d.includes('compress')||d.includes('squeeze')||d.includes('vol'))return'bf-rose';
  if(d.includes('tight')||d.includes('macro')||d.includes('data')||d.includes('stagflat')||d.includes('haven'))return'bf-amber';
  if(d==='leadership'||d.includes('risk-on')||d.includes('easing')||d.includes('earning'))return'bf-green';
  if(d.includes('def')||d.includes('usd')||d.includes('fx')||d.includes('rotation'))return'bf-purple';
  return'bf-muted';
}
function dirCSS(dir){const map={shock:'td-shock',tight:'td-tight',lead:'td-lead',def:'td-def',watch:'td-watch'};return map[dirClass(dir)]||'td-watch'}
function signalProb(score,conf){const b=conf==='High'?8:conf==='Medium'?0:-8;return Math.max(1,Math.min(99,Math.round(Number(score)+b)))}
function renderTags(tags){if(!Array.isArray(tags)||!tags.length)return'';return`<div class="tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`}

/* ── COLLAPSIBLE ── */
function toggleSection(id){
  const el=document.getElementById('col-'+id);
  const ch=document.getElementById('chev-'+id);
  if(!el)return;
  el.classList.toggle('collapsed');
  if(ch)ch.classList.toggle('open',!el.classList.contains('collapsed'));
}
function SH(title,sub,chip,id,open=true){
  const chev=id?`<span class="sh-chevron ${open?'open':''}" id="chev-${id}">▼</span>`:'';
  const clk=id?`onclick="toggleSection('${id}')"`:'';
  return`<div class="sh">
    <div>
      <div class="sh-title" ${clk}>${chev}${esc(title)}</div>
      ${sub?`<div class="sh-sub">${esc(sub)}</div>`:''}
    </div>
    ${chip?`<span class="chip ${chip.a?'accent':''}">${esc(chip.t)}</span>`:''}
  </div>`;
}

/* ── STRESS RING ── */
function renderRing(val,col,prior){
  const r=28,circ=2*Math.PI*r,offset=circ*(1-clamp(val)/100);
  const delta=prior!=null?val-prior:null;
  const dStr=delta!=null?(delta>0?'+':'')+delta:'';
  const dCol=delta!=null?(delta>0?'var(--rose)':delta<0?'var(--green)':'var(--muted)'):'';
  return`<div class="stress-ring-wrap">
    <div class="stress-ring">
      <svg width="66" height="66" viewBox="0 0 66 66">
        <circle class="ring-bg" cx="33" cy="33" r="28"/>
        <circle class="ring-fill" cx="33" cy="33" r="28" stroke="${col}" stroke-dasharray="${circ.toFixed(1)}" stroke-dashoffset="${offset.toFixed(1)}"/>
      </svg>
      <div class="ring-label">
        <span class="ring-num" style="color:${col}">${val}</span>
        <span class="ring-text">stress</span>
        ${delta!=null?`<span class="ring-delta" style="color:${dCol}">${dStr}</span>`:''}
      </div>
    </div>
    <div>
      <div style="font-size:13px;font-weight:500" id="ring-lbl">—</div>
      <div style="font-size:11px;color:var(--muted);margin-top:2px">Macro stress index</div>
      <div style="font-size:11px;color:var(--muted);margin-top:3px;max-width:190px;line-height:1.4" id="ring-sub"></div>
    </div>
  </div>`;
}

/* ══════════════════════════════
   INDICATOR ENGINE
══════════════════════════════ */
function getHeat(cm,...kw){const r=cm.find(r=>kw.some(k=>r.market&&r.market.toLowerCase().includes(k.toLowerCase())));return r?Number(r.heat):50}
function getSH(sh,...kw){const r=sh.find(r=>kw.some(k=>r.sector&&r.sector.toLowerCase().includes(k.toLowerCase())));return r?Number(r.heat):50}

function computeOGPI(d){
  const i=d.indicators||{},cm=d.crossMarket||[],sh=d.sectorHeat||[];
  const bH=getHeat(cm,'brent'),wH=getHeat(cm,'wti');
  const eH=getSH(sh,'energy')||Math.round((bH+wH)/2);
  const c1=i.brentWTISpread!=null?norm(i.brentWTISpread,0,20):Math.round(eH*0.82);
  const c2=i.hormuzclosurePct!=null?norm(100-i.hormuzclosurePct,0,100):92;
  const c3=i.tankerRatePremium!=null?norm(i.tankerRatePremium,0,200):Math.round(eH*0.9);
  const c4=i.futuresBackwardationBp!=null?norm(i.futuresBackwardationBp,-500,1000):Math.round(eH*0.76);
  const score=Math.round(c1*0.30+c2*0.35+c3*0.20+c4*0.15);
  return{score,state:score>=75?'active':score>=60?'watch':'off',components:[
    {l:'Brent-WTI spread',v:i.brentWTISpread!=null?'$'+i.brentWTISpread:'est.',n:c1,w:'30%'},
    {l:'Hormuz closure',v:i.hormuzclosurePct!=null?(100-i.hormuzclosurePct)+'% open':'est.',n:c2,w:'35%'},
    {l:'Tanker rate premium',v:i.tankerRatePremium!=null?i.tankerRatePremium+'%':'est.',n:c3,w:'20%'},
    {l:'Futures backwardation',v:i.futuresBackwardationBp!=null?i.futuresBackwardationBp+'bp':'est.',n:c4,w:'15%'},
  ]};
}

function computeAICS(d){
  const i=d.indicators||{},cm=d.crossMarket||[],sh=d.sectorHeat||[];
  const sH=getSH(sh,'semi','chip','memory')||getHeat(cm,'soxx','semi');
  const cH=getSH(sh,'cloud','ai infra')||getHeat(cm,'googl','alphabet','msft','amazon','amzn');
  const c1=i.cloudGrowthRate!=null?norm(i.cloudGrowthRate,0,80):Math.min(95,Math.max(sH,cH));
  const c2=sH||50;
  const c3=i.earningsRevisionTrend!=null?i.earningsRevisionTrend:Math.round(c1*0.82);
  const c4=i.aiRevCapexRatio!=null?norm(i.aiRevCapexRatio,0.3,1.5):50;
  const score=Math.round(c1*0.35+c2*0.25+c3*0.20+c4*0.20);
  return{score,state:score>=70?'active':score>=55?'watch':score<40?'fire':'off',components:[
    {l:'Cloud revenue accel.',v:i.cloudGrowthRate!=null?i.cloudGrowthRate+'% YoY':'est.',n:c1,w:'35%'},
    {l:'Semi demand chain',v:sH+' heat',n:c2,w:'25%'},
    {l:'Earnings revisions',v:i.earningsRevisionTrend!=null?i.earningsRevisionTrend+'/100':'est.',n:c3,w:'20%'},
    {l:'AI rev/capex ratio',v:i.aiRevCapexRatio!=null?i.aiRevCapexRatio.toFixed(2):'est.',n:c4,w:'20%'},
  ]};
}

function computeSPI(d){
  const i=d.indicators||{},cm=d.crossMarket||[],sh=d.sectorHeat||[];
  const eH=getSH(sh,'energy'),rH=getHeat(cm,'10y');
  const c1=eH;
  const c2=i.gdpGrowthEstimate!=null?norm(3-i.gdpGrowthEstimate,0,3):Math.round(100-rH*0.44);
  const c3=i.realWageYoY!=null?norm(-i.realWageYoY,-3,3):60;
  const c4=i.creditTighteningScore!=null?i.creditTighteningScore:Math.round(rH*0.57);
  const score=Math.round(c1*0.35+c2*0.25+c3*0.25+c4*0.15);
  const regime=score>=65?'Stagflation':score>=50?'Transitional':score>=35?'Growth':'Deflation';
  return{score,state:score>=65?'fire':score>=50?'watch':'off',regime,components:[
    {l:'Energy inflation',v:i.corePCETrend!=null?i.corePCETrend+'% PCE':'est.',n:c1,w:'35%'},
    {l:'Growth deceleration',v:i.gdpGrowthEstimate!=null?i.gdpGrowthEstimate+'% GDP':'est.',n:c2,w:'25%'},
    {l:'Real wage compress.',v:i.realWageYoY!=null?i.realWageYoY+'%':'est.',n:c3,w:'25%'},
    {l:'Credit tightening',v:i.creditTighteningScore!=null?i.creditTighteningScore+'/100':'est.',n:c4,w:'15%'},
  ]};
}

function computeMBDS(d){
  const i=d.indicators||{},cm=d.crossMarket||[];
  const spH=getHeat(cm,'s&p','spy'),iwH=getHeat(cm,'russell','iwm');
  const c1=i.advDecRatio!=null?norm(i.advDecRatio,0.3,1.8):Math.round(100-spH*0.5);
  const c2=i.newHiLoRatio!=null?norm(i.newHiLoRatio,0.5,5):37;
  const c3=i.capVsEqualWeightBp!=null?norm(-i.capVsEqualWeightBp,-100,100):Math.round(Math.abs(spH-iwH)*0.88);
  const c4=i.pctAbove50dMA!=null?norm(100-i.pctAbove50dMA,0,60):Math.round(100-spH*0.46);
  const score=Math.round(c1*0.30+c2*0.25+c3*0.25+c4*0.20);
  const diverged=score>55;
  return{score,state:diverged?'fire':score>=42?'watch':'off',diverged,components:[
    {l:'Adv / Dec ratio',v:i.advDecRatio!=null?i.advDecRatio.toFixed(2)+'x':'est.',n:c1,w:'30%'},
    {l:'New Hi / Lo ratio',v:i.newHiLoRatio!=null?i.newHiLoRatio.toFixed(1)+'x':'est.',n:c2,w:'25%'},
    {l:'Cap vs equal-weight',v:i.capVsEqualWeightBp!=null?i.capVsEqualWeightBp+'bp':'est.',n:c3,w:'25%'},
    {l:'% above 50d MA',v:i.pctAbove50dMA!=null?i.pctAbove50dMA+'%':'est.',n:c4,w:'20%'},
  ]};
}

function indColor(s){if(s>=80)return'var(--rose)';if(s>=60)return'var(--amber)';if(s>=40)return'var(--accent)';return'var(--green)'}

function statePill(state){
  const s=(state||'off').toLowerCase();
  if(s==='active')return`<span class="ind-state-pill isp-active"><span class="sdot sd-g"></span>Active</span>`;
  if(s==='fire')return`<span class="ind-state-pill isp-fire"><span class="sdot sd-r"></span>Signal</span>`;
  if(s==='watch')return`<span class="ind-state-pill isp-watch"><span class="sdot sd-a"></span>Watch</span>`;
  return`<span class="ind-state-pill isp-off"><span class="sdot sd-n"></span>Off</span>`;
}
function sigStatePill(state){
  const s=(state||'off').toLowerCase();
  if(s==='active')return`<span class="state-pill sp-active"><span class="sdot sd-g"></span>Active</span>`;
  if(s==='fire')return`<span class="state-pill sp-fire"><span class="sdot sd-r"></span>Signal</span>`;
  if(s==='watch')return`<span class="state-pill sp-watch"><span class="sdot sd-a"></span>Watch</span>`;
  return`<span class="state-pill sp-off"><span class="sdot sd-n"></span>Off</span>`;
}

function renderIndCard(name,acr,res,formula){
  const col=indColor(res.score);
  return`<div class="ind-card">
    <div class="ind-hdr">
      <div><div class="ind-name">${esc(name)}</div><div class="ind-acronym">${esc(acr)}</div></div>
      <div style="text-align:right"><div class="ind-score" style="color:${col}">${res.score}</div><div class="ind-score-sub">/ 100</div></div>
    </div>
    ${res.components.map(c=>`
    <div class="ind-gauge-row">
      <div class="ind-glbl">${esc(c.l)} <span style="color:var(--muted);font-size:9px">(${c.w})</span></div>
      <div class="ind-gtrack"><div class="ind-gfill ${heatClass(c.n)}" style="width:${c.n}%"></div></div>
      <div class="ind-gval">${esc(c.v)}</div>
    </div>`).join('')}
    <div class="ind-formula">${esc(formula)}</div>
    ${statePill(res.state)}
  </div>`;
}

function deriveSignals(d,ogpi,aics,spi,mbds){
  const sigs=[];
  const googl=d.crossMarket.find(r=>r.market&&(r.market.includes('GOOGL')||r.market.includes('Alphabet')));
  const meta=d.crossMarket.find(r=>r.market&&r.market.includes('Meta'));

  sigs.push({title:'Long energy / oil',from:`OGPI ${ogpi.score}`,
    logic:`OGPI at ${ogpi.score} — oil premium is ${ogpi.score>=75?'confirmed and elevated':'building'}. Brent-WTI spread and Hormuz closure driving sustained supply deficit pricing.`,
    levels:`Entry: OGPI > 75 AND Brent holds above 3-day avg  |  Exit: OGPI < 65 or Hormuz > 25%  |  Stop: OGPI < 60`,
    tags:['OGPI','Energy',ogpi.state==='active'?'High conviction':'Monitoring'],state:ogpi.state});

  sigs.push({title:'Long cloud infrastructure — GOOGL / MSFT / AMZN',from:`AICS ${aics.score}`,
    logic:`AICS at ${aics.score} — cloud revenue acceleration ${aics.score>=70?'confirmed. Alphabet +63% Cloud beat sets the benchmark':'building but rev/capex ratio below 1.0'}.`,
    levels:`Entry: AICS > 70 AND cloud growth > 50% YoY  |  Exit: AICS < 60  |  Stop: cloud growth < 40%`,
    tags:['AICS','Cloud','AI-driven'],state:aics.state==='fire'?'fire':aics.state});

  sigs.push({title:`${spi.regime} regime — long TIPS / real assets, short TLT`,from:`SPI ${spi.score} · ${spi.regime}`,
    logic:`SPI at ${spi.score} — ${spi.regime} regime ${spi.score>=65?'confirmed. Classic dual-failure: bonds AND equities under pressure':'approaching'}. Real assets, short duration outperform.`,
    levels:`Entry: SPI > 65  |  Exit: SPI < 55 for 3+ sessions  |  Stop: Core PCE < 2.2%`,
    tags:['SPI',spi.regime,'Macro regime'],state:spi.state});

  sigs.push({title:'Breadth divergence hedge — reduce index longs',from:`MBDS ${mbds.score} · ${mbds.diverged?'Divergence active':'No divergence'}`,
    logic:`MBDS at ${mbds.score} — ${mbds.diverged?'ACTIVE: cap-weight hitting highs while equal-weight lags and breadth deteriorates. Classic topping signature.':'Breadth and price reasonably aligned — no hedge trigger yet.'}`,
    levels:`Trigger: adv/dec < 0.80 AND cap vs EW gap > 30bp  |  Exit: breadth expands  |  Stop: index breaks higher with breadth`,
    tags:['MBDS','Breadth',mbds.diverged?'Hedge active':'Monitoring'],state:mbds.state});

  if(googl&&meta){
    const ps=(googl.heat>70&&meta.heat>65&&aics.score>=65)?'watch':'off';
    sigs.push({title:`Pair: long ${googl.market.split(' ')[0]} / short META`,from:`AICS split — Cloud ${googl.heat} vs Social ${meta.heat}`,
      logic:`Infrastructure AI (${googl.market}: heat ${googl.heat}) monetizing faster than social AI (Meta: heat ${meta.heat}). Revenue-per-capex-dollar diverging.`,
      levels:`Entry: GOOGL holds gap-up AND META fails pre-earnings close for 3 sessions  |  Exit: META user growth turns positive`,
      tags:['AICS split','Pair trade','AI monetization gap'],state:ps});
  }
  return sigs;
}

/* ── FLOW SUMMARY HELPERS ── */
function flowDirBadge(dir){
  const d=(dir||'').toLowerCase();
  if(d==='inflow')return`<span class="flow-dir-badge fd-in">↑ Inflow</span>`;
  if(d==='outflow')return`<span class="flow-dir-badge fd-out">↓ Outflow</span>`;
  return`<span class="flow-dir-badge fd-flat">→ Flat</span>`;
}
function flowSizeColor(dir,sig){
  const d=(dir||'').toLowerCase();
  if(d==='inflow')return`class="flow-size flow-sig-${(sig||'med').toLowerCase()}"`;
  return`class="flow-size flow-sig-${(sig||'med').toLowerCase()}"`;
}

          <div><div class="src-name">${esc(s.name||'')}</div><div class="src-type">${esc(s.type||'')}</div></div>
          ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener" class="src-link">↗</a>`:''}
        </div>`).join('')}
      </div>
    </div>
  </section>

  <!-- SANITY -->
  <section class="panel panel-dark fade-in">
    <div style="display:flex;justify-content:space-between;align-items:center;margin-bottom:10px">
      <div style="font-size:13px;font-weight:500;color:var(--muted)">Render Checks</div>
      <span class="rbadge ${allOk?'':'rb-high'}" style="${allOk?'background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.18)':''}">${allOk?'All passed':'Failures'}</span>
    </div>
    <div class="check-grid">
      ${checks.map(c=>`<div class="check-item"><div class="ci ${c.passed?'ci-ok':'ci-bad'}">${c.passed?'✓':'✗'}</div>${esc(c.label)}</div>`).join('')}
    </div>
  </section>
  `;

  /* PATCH RING */
  const rl=document.getElementById('ring-lbl');if(rl)rl.textContent=d.macroStressLabel||'';
  const rs=document.getElementById('ring-sub');if(rs)rs.textContent=d.macroStressSubtext||'';

  /* YIELD CURVE CHART */
  const ctx=document.getElementById('curveChart');
  if(ctx){
    new Chart(ctx,{type:'line',data:{labels:rateCurve.map(p=>p.tenor),datasets:[
      {label:'Prior',data:rateCurve.map(p=>Number(p.prior)),borderColor:'rgba(106,138,173,0.42)',backgroundColor:'transparent',borderWidth:1.5,borderDash:[4,4],pointRadius:2.5,pointBackgroundColor:'rgba(106,138,173,0.42)',tension:0.35},
      {label:'Current',data:rateCurve.map(p=>Number(p.current)),borderColor:'#00d4ff',backgroundColor:'rgba(0,212,255,0.04)',borderWidth:2,pointRadius:3.5,pointBackgroundColor:'#00d4ff',fill:true,tension:0.35}
    ]},options:{responsive:true,animation:{duration:650},plugins:{legend:{display:false},tooltip:{backgroundColor:'#0a1624',borderColor:'rgba(255,255,255,0.07)',borderWidth:1,titleColor:'#e8f0fe',bodyColor:'#6a8aad',callbacks:{label:c=>` ${c.dataset.label}: ${c.parsed.y.toFixed(2)}%`}}},scales:{x:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#6a8aad',font:{family:"'DM Mono',monospace",size:11}}},y:{grid:{color:'rgba(255,255,255,0.03)'},ticks:{color:'#6a8aad',font:{family:"'DM Mono',monospace",size:11},callback:v=>v.toFixed(2)+'%'}}}}});
  }
}

/* ── EXPAND/COLLAPSE HELPERS ── */
function toggleCMRow(i){
  const inner=document.getElementById('cmdi-'+i);
  const row=document.getElementById('cmr-'+i);
  if(!inner)return;
  inner.classList.toggle('open');
  row.classList.toggle('expanded');
}

/* ── COPY NARRATIVE ── */
function copyNarrative(){
  const d=window.__DATA__;if(!d)return;
  const t=[`MACRO SIGNAL CONSOLE — ${d.snapshotDate}`,'',d.narrativeSummary||'','',
    'TOP THEMES:',...(d.topThemes||[]).map(t=>`• ${t.theme} [${t.direction}, ${t.strength}/100]`),'',
    'CAPITAL FLOWS:',...(d.flows||[]).map(f=>`• [${f.direction}] ${f.asset}: ${f.size}`),'',
    'KEY RISKS:',...(d.risks||[]).slice(0,3).map(r=>`• [${r.level}] ${r.title}`),'',
    'WATCHPOINTS:',...(d.watchpoints||[]).map(w=>`• ${w.date}: ${w.event}`)].join('\n');
  navigator.clipboard.writeText(t).then(()=>{
    const btn=document.getElementById('copy-btn');btn.classList.add('copied');btn.textContent='✓ Copied';
    setTimeout(()=>{btn.classList.remove('copied');btn.innerHTML='<svg width="11" height="11" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1"/></svg> Copy narrative';},2500);});
}

render().catch(err=>{document.getElementById('app').innerHTML=`<section class="panel"><div style="font-family:var(--font-display);font-size:18px">Failed to load</div><div style="color:var(--muted);margin-top:8px;font-size:13px">${esc(String(err))}</div></section>`;});
</script>
</body>
</html>
