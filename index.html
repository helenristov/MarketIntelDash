<!doctype html>
<html lang="en">
<head>
  <meta charset="UTF-8"/>
  <meta name="viewport" content="width=device-width,initial-scale=1.0"/>
  <title>Macro Signal Console</title>
  <link rel="preconnect" href="https://fonts.googleapis.com"/>
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin/>
  <link href="https://fonts.googleapis.com/css2?family=DM+Mono:wght@400;500&family=Syne:wght@700;800&family=Inter:wght@300;400;500;600&display=swap" rel="stylesheet"/>
  <script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.min.js"></script>
  <style>
    :root {
      --bg:       #03080f;
      --surface0: #060d18;
      --surface1: #0a1624;
      --surface2: #0e1e30;
      --surface3: #15273d;
      --border:   rgba(255,255,255,0.06);
      --border2:  rgba(255,255,255,0.10);
      --text:     #e8f0fe;
      --muted:    #6a8aad;
      --muted2:   #8aaed0;
      --accent:   #00d4ff;
      --accent2:  #0098cc;
      --green:    #00e5a0;
      --rose:     #ff4d6d;
      --amber:    #ffb84d;
      --purple:   #b47aff;
      --r:        14px;
      --r2:       10px;
      --font-display: 'Syne', sans-serif;
      --font-body:    'Inter', sans-serif;
      --font-mono:    'DM Mono', monospace;
    }
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }
    html { scroll-behavior: smooth; }
    body {
      background: var(--bg);
      color: var(--text);
      font-family: var(--font-body);
      font-size: 14px;
      line-height: 1.6;
      min-height: 100vh;
      overflow-x: hidden;
    }

    /* ── NOISE / GRID TEXTURE ── */
    body::before {
      content: '';
      position: fixed; inset: 0;
      background-image:
        linear-gradient(rgba(0,212,255,.015) 1px, transparent 1px),
        linear-gradient(90deg, rgba(0,212,255,.015) 1px, transparent 1px);
      background-size: 40px 40px;
      pointer-events: none; z-index: 0;
    }

    /* ── NAV ── */
    #nav {
      position: sticky; top: 0; z-index: 100;
      background: rgba(3,8,15,.88);
      backdrop-filter: blur(16px);
      border-bottom: 1px solid var(--border);
      padding: 0 32px;
      display: flex; align-items: center; gap: 0; height: 48px;
      overflow-x: auto; scrollbar-width: none;
    }
    #nav::-webkit-scrollbar { display: none; }
    #nav a {
      color: var(--muted); text-decoration: none;
      font-size: 11px; font-weight: 500; letter-spacing: .08em; text-transform: uppercase;
      padding: 0 16px; height: 48px; display: flex; align-items: center;
      border-bottom: 2px solid transparent; white-space: nowrap;
      transition: color .2s, border-color .2s;
    }
    #nav a:hover { color: var(--text); border-color: var(--accent); }
    .nav-brand {
      font-family: var(--font-display); font-size: 13px; font-weight: 800;
      color: var(--accent); letter-spacing: .04em; margin-right: 16px;
      padding-right: 16px; border-right: 1px solid var(--border2);
      white-space: nowrap; flex-shrink: 0;
    }
    .nav-stress {
      margin-left: auto; flex-shrink: 0;
      display: flex; align-items: center; gap: 8px; padding-left: 16px;
    }
    .stress-dot { width: 8px; height: 8px; border-radius: 50%; background: var(--rose); animation: pulse 2s infinite; }
    @keyframes pulse { 0%,100%{opacity:1} 50%{opacity:.4} }

    /* ── PAGE LAYOUT ── */
    .page { max-width: 1400px; margin: 0 auto; padding: 32px 32px 80px; position: relative; z-index: 1; }
    .stack { display: flex; flex-direction: column; gap: 28px; }

    /* ── PANELS ── */
    .panel {
      background: var(--surface1);
      border: 1px solid var(--border);
      border-radius: var(--r);
      padding: 28px;
      position: relative;
      overflow: hidden;
    }
    .panel::before {
      content: '';
      position: absolute; top: 0; left: 0; right: 0; height: 1px;
      background: linear-gradient(90deg, transparent, rgba(0,212,255,.3), transparent);
    }
    .panel-dark { background: var(--surface0); }

    /* ── SECTION HEADER ── */
    .sec-head { display: flex; justify-content: space-between; align-items: flex-start; gap: 16px; flex-wrap: wrap; margin-bottom: 24px; }
    .sec-title { font-family: var(--font-display); font-size: 22px; font-weight: 700; letter-spacing: -.01em; }
    .sec-sub { font-size: 12px; color: var(--muted); margin-top: 4px; max-width: 560px; }
    .chip {
      display: inline-flex; align-items: center; gap: 6px;
      border: 1px solid var(--border2); border-radius: 999px;
      padding: 5px 12px; font-size: 11px; font-weight: 500; color: var(--muted2);
      white-space: nowrap;
    }
    .chip.accent { border-color: var(--accent); color: var(--accent); }

    /* ── HERO ── */
    .hero { padding: 40px 40px 36px; }
    .hero-eyebrow { display: flex; align-items: center; gap: 10px; margin-bottom: 20px; }
    .badge-live {
      display: inline-flex; align-items: center; gap: 6px;
      background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.25);
      border-radius: 999px; padding: 4px 12px;
      font-family: var(--font-mono); font-size: 10px; font-weight: 500; color: var(--accent);
      letter-spacing: .1em; text-transform: uppercase;
    }
    .badge-date {
      font-family: var(--font-mono); font-size: 11px; color: var(--muted);
    }
    .hero-title {
      font-family: var(--font-display);
      font-size: clamp(32px, 4vw, 54px);
      font-weight: 800;
      line-height: .96;
      letter-spacing: -.03em;
      max-width: 820px;
      margin-bottom: 20px;
    }
    .hero-title span { color: var(--accent); }
    .hero-narrative {
      font-size: 14px; line-height: 1.75; color: var(--muted2);
      max-width: 860px; margin-bottom: 28px;
      border-left: 2px solid var(--accent2);
      padding-left: 16px;
    }
    .hero-bottom { display: flex; gap: 16px; align-items: flex-start; flex-wrap: wrap; }

    /* ── STAT CARDS ── */
    .stat-row { display: grid; grid-template-columns: repeat(4, minmax(0,1fr)); gap: 12px; }
    .stat-card {
      background: var(--surface2);
      border: 1px solid var(--border);
      border-radius: var(--r2);
      padding: 16px;
    }
    .stat-label { font-size: 10px; font-weight: 600; letter-spacing: .1em; text-transform: uppercase; color: var(--muted); }
    .stat-value { font-family: var(--font-mono); font-size: 26px; font-weight: 500; line-height: 1.2; margin: 8px 0 4px; }
    .stat-note { font-size: 11px; color: var(--muted); line-height: 1.4; }
    .val-rose { color: var(--rose); }
    .val-accent { color: var(--accent); }
    .val-amber { color: var(--amber); }
    .val-green { color: var(--green); }

    /* ── STRESS RING ── */
    .stress-ring-wrap {
      display: flex; align-items: center; gap: 20px;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 16px 20px;
    }
    .stress-ring {
      position: relative; width: 72px; height: 72px; flex-shrink: 0;
    }
    .stress-ring svg { transform: rotate(-90deg); }
    .ring-bg { fill: none; stroke: var(--surface3); stroke-width: 7; }
    .ring-fill { fill: none; stroke-width: 7; stroke-linecap: round; transition: stroke-dashoffset .8s ease; }
    .ring-label {
      position: absolute; inset: 0; display: flex; flex-direction: column;
      align-items: center; justify-content: center;
    }
    .ring-num { font-family: var(--font-mono); font-size: 18px; font-weight: 500; }
    .ring-text { font-size: 8px; color: var(--muted); letter-spacing: .06em; text-transform: uppercase; margin-top: -2px; }

    /* ── COPY BUTTON ── */
    #copy-btn {
      display: inline-flex; align-items: center; gap: 8px;
      background: transparent; border: 1px solid var(--border2);
      border-radius: 999px; padding: 8px 16px;
      color: var(--muted2); font-size: 11px; font-weight: 500;
      cursor: pointer; transition: all .2s; white-space: nowrap;
    }
    #copy-btn:hover { border-color: var(--accent); color: var(--accent); }
    #copy-btn.copied { border-color: var(--green); color: var(--green); }

    /* ── THEMES ── */
    .theme-grid { display: grid; grid-template-columns: repeat(5, minmax(0,1fr)); gap: 12px; }
    .theme-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 14px;
      position: relative; overflow: hidden;
    }
    .theme-card::after {
      content: '';
      position: absolute; bottom: 0; left: 0; right: 0; height: 3px;
      background: var(--accent); opacity: .4;
      transform-origin: left;
    }
    .theme-dir {
      display: inline-block;
      background: rgba(0,212,255,.08); border: 1px solid rgba(0,212,255,.2);
      border-radius: 4px; padding: 2px 8px;
      font-family: var(--font-mono); font-size: 9px; color: var(--accent);
      letter-spacing: .08em; text-transform: uppercase; margin-bottom: 8px;
    }
    .theme-dir.shock  { background: rgba(255,77,109,.08); border-color: rgba(255,77,109,.2); color: var(--rose); }
    .theme-dir.tight  { background: rgba(255,184,77,.08); border-color: rgba(255,184,77,.2); color: var(--amber); }
    .theme-dir.lead   { background: rgba(0,229,160,.08);  border-color: rgba(0,229,160,.2);  color: var(--green); }
    .theme-dir.def    { background: rgba(180,122,255,.08);border-color: rgba(180,122,255,.2);color: var(--purple); }
    .theme-dir.watch  { background: rgba(106,138,173,.08);border-color: rgba(106,138,173,.2);color: var(--muted2); }
    .theme-name { font-size: 13px; font-weight: 500; line-height: 1.35; margin-bottom: 8px; }
    .theme-impact { font-size: 11px; color: var(--muted); line-height: 1.4; margin-bottom: 10px; }
    .bar-track { height: 4px; background: var(--surface3); border-radius: 999px; overflow: hidden; }
    .bar-fill  { height: 100%; background: var(--accent); border-radius: 999px; }
    .bar-fill.rose   { background: var(--rose); }
    .bar-fill.amber  { background: var(--amber); }
    .bar-fill.green  { background: var(--green); }
    .bar-fill.purple { background: var(--purple); }
    .bar-fill.muted  { background: var(--muted); }
    .strength-label { font-family: var(--font-mono); font-size: 10px; color: var(--muted); margin-top: 4px; }

    /* ── YIELD CURVE CHART ── */
    .chart-wrap {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 20px; position: relative;
    }
    .chart-legend {
      display: flex; gap: 20px; margin-bottom: 12px;
    }
    .legend-item { display: flex; align-items: center; gap: 6px; font-size: 11px; color: var(--muted2); }
    .legend-dot { width: 20px; height: 2px; border-radius: 1px; }
    canvas#curveChart { max-height: 220px; }
    .curve-read {
      background: var(--surface0); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 14px 18px;
      font-size: 13px; line-height: 1.6; color: var(--muted2); margin-top: 16px;
    }
    .curve-read strong { color: var(--text); }

    /* ── CROSS-MARKET TABLE ── */
    .table-wrap { overflow-x: auto; }
    table { width: 100%; border-collapse: collapse; font-size: 13px; }
    thead tr { border-bottom: 1px solid var(--border2); }
    th { padding: 10px 14px; text-align: left; font-size: 10px; font-weight: 600; letter-spacing: .08em; text-transform: uppercase; color: var(--muted); white-space: nowrap; }
    td { padding: 12px 14px; border-bottom: 1px solid var(--border); }
    tbody tr:last-child td { border-bottom: none; }
    tbody tr:hover td { background: rgba(255,255,255,.02); }
    .mkt-name { font-weight: 500; color: var(--text); }
    .mkt-driver { color: var(--muted2); font-size: 12px; }
    .move-val { font-family: var(--font-mono); font-weight: 500; }
    .trend-pill {
      display: inline-block; border-radius: 4px; padding: 2px 7px;
      font-size: 10px; font-weight: 600; letter-spacing: .04em;
    }
    .t-up   { background: rgba(255,77,109,.12); color: var(--rose); }
    .t-down { background: rgba(0,229,160,.10); color: var(--green); }
    .t-neut { background: rgba(106,138,173,.12); color: var(--muted2); }
    .heat-bar { display: flex; align-items: center; gap: 8px; min-width: 110px; }
    .heat-track { flex: 1; height: 4px; background: var(--surface3); border-radius: 999px; overflow: hidden; }
    .heat-fill { height: 100%; border-radius: 999px; }
    .h-crit { background: var(--rose); }
    .h-high { background: var(--amber); }
    .h-mid  { background: var(--accent); }
    .h-low  { background: var(--muted); }
    .heat-num { font-family: var(--font-mono); font-size: 11px; color: var(--muted2); width: 24px; }
    .rbadge {
      display: inline-block; border-radius: 4px; padding: 2px 8px;
      font-size: 10px; font-weight: 700; letter-spacing: .04em;
    }
    .rb-high { background: rgba(255,77,109,.12);    color: var(--rose); }
    .rb-elev { background: rgba(255,184,77,.12);    color: var(--amber); }
    .rb-mod  { background: rgba(180,122,255,.12);   color: var(--purple); }
    .rb-watch{ background: rgba(106,138,173,.12);   color: var(--muted2); }

    /* ── TWO / THREE COLUMN GRIDS ── */
    .two-col   { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 28px; }
    .three-col { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 28px; }

    /* ── DRIVER CARDS ── */
    .driver-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 16px; margin-bottom: 12px;
    }
    .driver-card:last-child { margin-bottom: 0; }
    .driver-head { display: flex; justify-content: space-between; gap: 12px; align-items: flex-start; }
    .driver-name { font-size: 14px; font-weight: 500; line-height: 1.35; }
    .driver-score { font-family: var(--font-mono); font-size: 28px; color: var(--accent); line-height: 1; }
    .driver-meta { font-size: 11px; color: var(--muted); margin-top: 4px; }
    .driver-detail { font-size: 13px; color: var(--muted2); margin-top: 10px; line-height: 1.55; }
    .conf-badge {
      border-radius: 999px; padding: 3px 10px; font-size: 10px; font-weight: 600; display: inline-block;
    }
    .conf-high { background: rgba(0,229,160,.10); color: var(--green); border: 1px solid rgba(0,229,160,.2); }
    .conf-med  { background: rgba(255,184,77,.10); color: var(--amber); border: 1px solid rgba(255,184,77,.2); }
    .conf-low  { background: rgba(106,138,173,.1); color: var(--muted2); border: 1px solid var(--border); }
    .prob-row { display: flex; justify-content: space-between; align-items: center; margin-top: 12px; font-size: 12px; }
    .prob-val { font-family: var(--font-mono); font-weight: 500; }

    /* ── SECTOR HEATMAP ── */
    .sector-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 8px; }
    .sector-tile {
      border-radius: var(--r2); padding: 12px 14px;
      border: 1px solid transparent;
    }
    .sec-name { font-size: 13px; font-weight: 500; }
    .sec-trend { font-size: 11px; margin-top: 2px; }
    .sec-driver { font-size: 11px; color: rgba(255,255,255,.45); margin-top: 4px; }
    .sec-heat-num { font-family: var(--font-mono); font-size: 22px; font-weight: 500; float: right; line-height: 1; }
    .sh-critical { background: rgba(255,77,109,.18); border-color: rgba(255,77,109,.3); }
    .sh-high     { background: rgba(255,184,77,.14); border-color: rgba(255,184,77,.25); }
    .sh-mid      { background: rgba(0,212,255,.10);  border-color: rgba(0,212,255,.2); }
    .sh-low      { background: rgba(106,138,173,.08);border-color: rgba(106,138,173,.15); }

    /* ── RISK CARDS ── */
    .risk-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 14px 16px; margin-bottom: 10px;
    }
    .risk-card:last-child { margin-bottom: 0; }
    .risk-head { display: flex; justify-content: space-between; gap: 8px; align-items: center; }
    .risk-title { font-size: 14px; font-weight: 500; }
    .risk-desc { font-size: 13px; color: var(--muted2); margin-top: 8px; line-height: 1.55; }

    /* ── TIMELINE ── */
    .timeline { display: flex; flex-direction: column; gap: 0; }
    .tl-item { display: flex; gap: 16px; }
    .tl-rail { display: flex; flex-direction: column; align-items: center; flex-shrink: 0; width: 16px; }
    .tl-dot { width: 10px; height: 10px; border-radius: 50%; background: var(--accent); flex-shrink: 0; margin-top: 4px; border: 2px solid var(--surface1); outline: 2px solid var(--accent); }
    .tl-line { flex: 1; width: 1px; background: var(--border2); margin: 4px 0; min-height: 20px; }
    .tl-time { font-family: var(--font-mono); font-size: 10px; color: var(--accent); letter-spacing: .08em; text-transform: uppercase; }
    .tl-headline { font-size: 14px; font-weight: 500; margin-top: 4px; line-height: 1.4; }
    .tl-effect { font-size: 12px; color: var(--muted); margin-top: 4px; margin-bottom: 16px; }

    /* ── SCENARIOS ── */
    .scenario-grid { display: grid; grid-template-columns: repeat(3, minmax(0,1fr)); gap: 16px; }
    .scenario-card {
      border-radius: var(--r2); padding: 18px;
      border: 1px solid transparent; position: relative; overflow: hidden;
    }
    .sc-bear { background: rgba(255,77,109,.08); border-color: rgba(255,77,109,.2); }
    .sc-base { background: rgba(0,212,255,.06);  border-color: rgba(0,212,255,.18); }
    .sc-bull { background: rgba(0,229,160,.07);  border-color: rgba(0,229,160,.18); }
    .sc-label {
      font-family: var(--font-mono); font-size: 9px; font-weight: 500;
      letter-spacing: .12em; text-transform: uppercase; margin-bottom: 8px;
    }
    .sc-bear .sc-label { color: var(--rose); }
    .sc-base .sc-label { color: var(--accent); }
    .sc-bull .sc-label { color: var(--green); }
    .sc-title { font-size: 15px; font-weight: 600; margin-bottom: 10px; }
    .sc-prob-row { display: flex; align-items: center; gap: 10px; margin-bottom: 12px; }
    .sc-prob { font-family: var(--font-mono); font-size: 32px; font-weight: 500; line-height: 1; }
    .sc-prob-label { font-size: 10px; color: var(--muted); line-height: 1.3; }
    .sc-bear .sc-prob { color: var(--rose); }
    .sc-base .sc-prob { color: var(--accent); }
    .sc-bull .sc-prob { color: var(--green); }
    .sc-outcome { font-size: 12px; color: var(--muted2); line-height: 1.55; margin-bottom: 12px; }
    .sc-trigger { font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; line-height: 1.45; }
    .sc-trigger strong { color: var(--text); }

    /* ── WATCHPOINTS ── */
    .wp-list { display: flex; flex-direction: column; gap: 8px; }
    .wp-item {
      display: flex; gap: 14px; align-items: flex-start;
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 12px 14px;
    }
    .wp-date { font-family: var(--font-mono); font-size: 11px; color: var(--accent); width: 44px; flex-shrink: 0; padding-top: 2px; }
    .wp-event { font-size: 13px; font-weight: 500; flex: 1; }
    .wp-tag {
      border-radius: 4px; padding: 2px 7px;
      font-size: 10px; font-weight: 600; letter-spacing: .04em; flex-shrink: 0;
    }
    .wt-high { background: rgba(255,77,109,.12); color: var(--rose); }
    .wt-med  { background: rgba(255,184,77,.12); color: var(--amber); }

    /* ── STRATEGY ── */
    .strategy-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 12px; }
    .strat-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 16px;
    }
    .strat-head { display: flex; justify-content: space-between; gap: 8px; align-items: flex-start; margin-bottom: 10px; }
    .strat-title { font-size: 14px; font-weight: 500; }
    .strat-body { font-size: 13px; color: var(--muted2); line-height: 1.55; margin-bottom: 12px; }
    .strat-trigger { font-size: 11px; color: var(--muted); border-top: 1px solid var(--border); padding-top: 10px; }
    .strat-trigger strong { color: var(--accent); }

    /* ── SOURCES ── */
    .src-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 10px; }
    .src-card {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 12px 14px;
      display: flex; justify-content: space-between; align-items: flex-start; gap: 10px;
    }
    .src-name { font-size: 13px; font-weight: 500; }
    .src-type { font-size: 11px; color: var(--muted); margin-top: 2px; }
    .src-link {
      color: var(--accent); text-decoration: none;
      font-family: var(--font-mono); font-size: 10px; border: 1px solid rgba(0,212,255,.2);
      padding: 3px 8px; border-radius: 4px; white-space: nowrap; flex-shrink: 0;
      transition: background .2s;
    }
    .src-link:hover { background: rgba(0,212,255,.1); }

    /* ── SANITY ── */
    .checks-wrap {
      background: var(--surface2); border: 1px solid var(--border);
      border-radius: var(--r2); padding: 16px;
    }
    .check-head { display: flex; justify-content: space-between; align-items: center; margin-bottom: 12px; }
    .check-grid { display: grid; grid-template-columns: repeat(2, minmax(0,1fr)); gap: 6px; }
    .check-item { display: flex; align-items: center; gap: 8px; font-size: 12px; color: var(--muted2); }
    .check-icon { width: 14px; height: 14px; border-radius: 50%; display: flex; align-items: center; justify-content: center; font-size: 9px; flex-shrink: 0; }
    .ci-ok  { background: rgba(0,229,160,.15); color: var(--green); }
    .ci-bad { background: rgba(255,77,109,.15); color: var(--rose); }

    /* ── DISCLAIMER ── */
    .disclaimer {
      background: rgba(255,184,77,.04); border: 1px solid rgba(255,184,77,.15);
      border-radius: var(--r2); padding: 14px 18px;
      font-size: 12px; color: rgba(255,184,77,.7); line-height: 1.55; margin-top: 20px;
    }
    .disclaimer strong { color: var(--amber); }

    /* ── TAGS ── */
    .tags { display: flex; gap: 6px; flex-wrap: wrap; margin-top: 10px; }
    .tag {
      border: 1px solid var(--border2); border-radius: 4px;
      padding: 2px 8px; font-size: 10px; color: var(--muted); letter-spacing: .04em;
    }

    /* ── ANIMATIONS ── */
    .fade-in { animation: fadeIn .5s ease both; }
    @keyframes fadeIn { from { opacity: 0; transform: translateY(8px); } to { opacity: 1; transform: none; } }

    /* ── RESPONSIVE ── */
    @media (max-width: 1100px) {
      .theme-grid { grid-template-columns: repeat(3, minmax(0,1fr)); }
      .scenario-grid { grid-template-columns: 1fr 1fr; }
      .stat-row { grid-template-columns: repeat(2, minmax(0,1fr)); }
    }
    @media (max-width: 768px) {
      .page { padding: 16px; }
      .hero { padding: 24px; }
      .two-col, .three-col { grid-template-columns: 1fr; }
      .theme-grid, .sector-grid, .scenario-grid, .strategy-grid, .src-grid { grid-template-columns: 1fr 1fr; }
      .stat-row { grid-template-columns: 1fr 1fr; }
      #nav { padding: 0 16px; }
      .hero-title { font-size: 28px; }
    }
    @media (max-width: 480px) {
      .theme-grid, .sector-grid, .scenario-grid, .strategy-grid, .src-grid { grid-template-columns: 1fr; }
      .stat-row { grid-template-columns: 1fr; }
    }
  </style>
</head>
<body>

<!-- NAV -->
<nav id="nav">
  <span class="nav-brand">MSC</span>
  <a href="#hero">Overview</a>
  <a href="#themes">Themes</a>
  <a href="#curve">Rate Curve</a>
  <a href="#cross">Cross-Market</a>
  <a href="#drivers">Drivers</a>
  <a href="#scenarios">Scenarios</a>
  <a href="#watchpoints">Watchpoints</a>
  <a href="#strategy">Strategy</a>
  <a href="#sources">Sources</a>
  <div class="nav-stress">
    <span class="stress-dot"></span>
    <span style="font-size:11px;color:var(--muted);font-family:var(--font-mono)" id="nav-stress-label">—</span>
  </div>
</nav>

<div class="page">
  <div id="app" class="stack"></div>
</div>

<script>
const esc = s => String(s ?? '').replace(/&/g,'&amp;').replace(/</g,'&lt;').replace(/>/g,'&gt;').replace(/"/g,'&quot;');
const clamp = v => Math.max(0, Math.min(100, Number(v) || 0));

function heatClass(h) {
  h = Number(h);
  if (h >= 90) return 'h-crit';
  if (h >= 75) return 'h-high';
  if (h >= 60) return 'h-mid';
  return 'h-low';
}
function riskBadge(lvl) {
  const m = { High:'rb-high', Elevated:'rb-elev', Medium:'rb-mod', Moderate:'rb-mod', Watch:'rb-watch' };
  return `<span class="rbadge ${m[lvl]||'rb-watch'}">${esc(lvl)}</span>`;
}
function confBadge(c) {
  const m = { High:'conf-high', Medium:'conf-med' };
  return `<span class="conf-badge ${m[c]||'conf-low'}">${esc(c||'Low')} conf.</span>`;
}
function signalProb(score, conf) {
  const b = conf==='High'?8:conf==='Medium'?0:-8;
  return Math.max(1,Math.min(99,Math.round(Number(score)+b)));
}
function probColor(p) {
  if (p>=85) return 'var(--green)';
  if (p>=70) return 'var(--accent)';
  if (p>=55) return 'var(--amber)';
  return 'var(--muted2)';
}
function trendClass(t) {
  if (!t) return 't-neut';
  const lo = t.toLowerCase();
  if (lo.includes('higher')||lo.includes('surge')||lo.includes('sharp')) return 't-up';
  if (lo.includes('lower')||lo.includes('lag')) return 't-down';
  return 't-neut';
}
function sectorClass(h) {
  h = Number(h);
  if (h >= 88) return 'sh-critical';
  if (h >= 72) return 'sh-high';
  if (h >= 58) return 'sh-mid';
  return 'sh-low';
}
function sectorHeatColor(h) {
  h = Number(h);
  if (h >= 88) return 'var(--rose)';
  if (h >= 72) return 'var(--amber)';
  if (h >= 58) return 'var(--accent)';
  return 'var(--muted2)';
}
function barClass(dir) {
  const d = (dir||'').toLowerCase();
  if (d==='shock') return 'rose';
  if (d.includes('tight')) return 'amber';
  if (d==='leadership') return 'green';
  if (d.includes('def')||d.includes('usd')) return 'purple';
  return 'muted';
}
function dirClass(dir) {
  const d = (dir||'').toLowerCase();
  if (d==='shock') return 'shock';
  if (d.includes('tight')) return 'tight';
  if (d==='leadership') return 'lead';
  if (d.includes('def')) return 'def';
  return 'watch';
}
function ringStroke(val) {
  const r = 28, circ = 2*Math.PI*r;
  const offset = circ * (1 - clamp(val)/100);
  return { circ, offset };
}
function stressColor(v) {
  if (v>=85) return 'var(--rose)';
  if (v>=70) return 'var(--amber)';
  if (v>=55) return 'var(--accent)';
  return 'var(--green)';
}
function scenClass(label) {
  const l = label.toLowerCase();
  if (l==='bear') return 'sc-bear';
  if (l==='bull') return 'sc-bull';
  return 'sc-base';
}

function renderTags(tags) {
  if (!Array.isArray(tags)||!tags.length) return '';
  return `<div class="tags">${tags.map(t=>`<span class="tag">${esc(t)}</span>`).join('')}</div>`;
}

function renderStressRing(val, label, color) {
  const {circ, offset} = ringStroke(val);
  return `
    <div class="stress-ring-wrap">
      <div class="stress-ring">
        <svg width="72" height="72" viewBox="0 0 72 72">
          <circle class="ring-bg" cx="36" cy="36" r="28"/>
          <circle class="ring-fill" cx="36" cy="36" r="28"
            stroke="${color}"
            stroke-dasharray="${circ.toFixed(1)}"
            stroke-dashoffset="${offset.toFixed(1)}"/>
        </svg>
        <div class="ring-label">
          <span class="ring-num" style="color:${color}">${val}</span>
          <span class="ring-text">stress</span>
        </div>
      </div>
      <div>
        <div style="font-size:13px;font-weight:500">${esc(label)}</div>
        <div style="font-size:11px;color:var(--muted);margin-top:2px">Composite macro stress index</div>
        <div style="font-size:11px;color:var(--muted);margin-top:4px;max-width:220px;line-height:1.4" id="stress-sub-text"></div>
      </div>
    </div>`;
}

async function render() {
  const res = await fetch('./market_data.json', {cache:'no-store'});
  if (!res.ok) throw new Error(`HTTP ${res.status}`);
  const d = await res.json();

  const topThemes   = Array.isArray(d.topThemes)   ? d.topThemes   : [];
  const rateCurve   = Array.isArray(d.rateCurve)   ? d.rateCurve   : [];
  const crossMarket = Array.isArray(d.crossMarket)  ? d.crossMarket : [];
  const drivers     = Array.isArray(d.drivers)     ? d.drivers     : [];
  const risks       = Array.isArray(d.risks)       ? d.risks       : [];
  const timeline    = Array.isArray(d.timeline)    ? d.timeline    : [];
  const strategies  = Array.isArray(d.strategies)  ? d.strategies  : [];
  const sources     = Array.isArray(d.sources)     ? d.sources     : [];
  const scenarios   = Array.isArray(d.scenarios)   ? d.scenarios   : [];
  const watchpoints = Array.isArray(d.watchpoints)  ? d.watchpoints : [];
  const sectorHeat  = Array.isArray(d.sectorHeat)  ? d.sectorHeat  : [];

  const msi = Number(d.macroStressIndex) || 0;
  const msiColor = stressColor(msi);

  // Update nav
  document.getElementById('nav-stress-label').textContent = `MSI ${msi}`;

  const checks = [
    { label:'theme cards (≥1)',          passed: topThemes.length>=1 },
    { label:'cross-market rows (≥1)',    passed: crossMarket.length>=1 },
    { label:'curve points (≥3)',         passed: rateCurve.length>=3 },
    { label:'driver cards (≥1)',         passed: drivers.length>=1 },
    { label:'strategy cards (≥1)',       passed: strategies.length>=1 },
    { label:'sources present',           passed: sources.length>=1 },
    { label:'curve values numeric',      passed: rateCurve.every(p=>isFinite(Number(p.current))&&isFinite(Number(p.prior))) },
    { label:'heat values numeric',       passed: crossMarket.every(r=>isFinite(Number(r.heat))) },
  ];
  const allOk = checks.every(c=>c.passed);

  const app = document.getElementById('app');
  app.innerHTML = `

  <!-- ═══════════ HERO ═══════════ -->
  <section class="panel hero fade-in" id="hero">
    <div class="hero-eyebrow">
      <span class="badge-live"><span style="width:6px;height:6px;border-radius:50%;background:var(--accent);display:inline-block"></span>Snapshot</span>
      <span class="badge-date">${esc(d.snapshotDate||'N/A')} · ${esc(d.lastUpdated||'')}</span>
    </div>
    <h1 class="hero-title">
      AI Market<br/><span>Intelligence</span><br/>Dashboard
    </h1>
    <p class="hero-narrative">${esc(d.narrativeSummary||d.marketPulseSubtext||'')}</p>

    <div class="hero-bottom">
      ${renderStressRing(msi, esc(d.macroStressLabel||'Elevated'), msiColor)}
      <div style="flex:1;min-width:260px">
        <div class="stat-row">
          <div class="stat-card">
            <div class="stat-label">Market Pulse</div>
            <div class="stat-value val-rose" style="font-size:16px;margin-top:6px;line-height:1.3">${esc((d.marketPulse||'').substring(0,40)+(d.marketPulse?.length>40?'…':''))}</div>
          </div>
          <div class="stat-card">
            <div class="stat-label">Top Signal</div>
            <div class="stat-value val-amber" style="font-size:13px;margin-top:6px;line-height:1.4">${esc((d.topDriver||'N/A').substring(0,60)+(d.topDriver?.length>60?'…':''))}</div>
          </div>
          ${(()=>{
            const brent = crossMarket.find(r=>r.market&&r.market.toLowerCase().includes('brent'));
            const color = brent ? (Number(brent.heat)>=80?'val-rose':Number(brent.heat)>=60?'val-amber':'val-green') : 'val-rose';
            return `<div class="stat-card">
              <div class="stat-label">Brent Crude</div>
              <div class="stat-value ${color}">${esc(brent?.move||'—')}</div>
              <div class="stat-note">${esc(brent?.trend||'')} · ${esc(brent?.risk||'')}</div>
            </div>`;
          })()}
          ${(()=>{
            const t10 = crossMarket.find(r=>r.market&&r.market.includes('10Y'));
            const color = t10 ? (Number(t10.heat)>=75?'val-rose':Number(t10.heat)>=55?'val-amber':'val-accent') : 'val-amber';
            return `<div class="stat-card">
              <div class="stat-label">10Y Treasury</div>
              <div class="stat-value ${color}">${esc(t10?.move||'—')}</div>
              <div class="stat-note">${esc(t10?.trend||'')}</div>
            </div>`;
          })()}
        </div>
      </div>
    </div>

    <div style="display:flex;gap:10px;align-items:center;margin-top:20px;flex-wrap:wrap">
      <button id="copy-btn" onclick="copyNarrative()">
        <svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5">
          <rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1"/>
        </svg>
        Copy narrative summary
      </button>
      ${renderTags(d.tags)}
    </div>

    <div class="disclaimer"><strong>Prototype:</strong> ${esc(String(d.disclaimer||'').replace(/^Prototype disclaimer:\s*/i,''))}</div>
  </section>

  <!-- ═══════════ TOP THEMES ═══════════ -->
  <section class="panel fade-in" id="themes">
    <div class="sec-head">
      <div>
        <div class="sec-title">Top Themes</div>
        <div class="sec-sub">Dominant narrative forces shaping cross-asset behavior today.</div>
      </div>
      <span class="chip accent">${topThemes.length} active</span>
    </div>
    <div class="theme-grid">
      ${topThemes.map(item=>{
        const bc = barClass(item.direction);
        const dc = dirClass(item.direction);
        return `
        <div class="theme-card">
          <div class="theme-dir ${dc}">${esc(item.direction||'Signal')}</div>
          <div class="theme-name">${esc(item.theme||'')}</div>
          <div class="theme-impact">${esc(item.impact||'')}</div>
          ${renderTags(item.tags)}
          <div class="bar-track" style="margin-top:10px">
            <div class="bar-fill ${bc}" style="width:${clamp(item.strength)}%"></div>
          </div>
          <div class="strength-label">${clamp(item.strength)}/100 signal strength</div>
        </div>`;
      }).join('')}
    </div>
  </section>

  <!-- ═══════════ RATE CURVE ═══════════ -->
  <section class="panel fade-in" id="curve">
    <div class="sec-head">
      <div>
        <div class="sec-title">Rate Curve Monitor</div>
        <div class="sec-sub">Full tenor snapshot — current vs prior. Hover for values.</div>
      </div>
      <span class="chip">snapshot · ${esc(d.snapshotDate||'')}</span>
    </div>
    <div class="chart-wrap">
      <div class="chart-legend">
        <div class="legend-item"><div class="legend-dot" style="background:rgba(106,138,173,.5);border-top:2px dashed rgba(106,138,173,.5)"></div>Prior</div>
        <div class="legend-item"><div class="legend-dot" style="background:var(--accent)"></div>Current</div>
      </div>
      <canvas id="curveChart"></canvas>
    </div>
    <div class="curve-read"><strong>Read:</strong> ${esc(d.rateCurveRead||'')}</div>
  </section>

  <!-- ═══════════ CROSS-MARKET ═══════════ -->
  <section class="panel fade-in" id="cross">
    <div class="sec-head">
      <div>
        <div class="sec-title">Cross-Market Dashboard</div>
        <div class="sec-sub">What is moving, why it is moving, and how stressed each pocket looks.</div>
      </div>
    </div>
    <div class="table-wrap">
      <table>
        <thead>
          <tr>
            <th>Market</th><th>Risk</th><th>Primary Driver</th>
            <th>Level / Move</th><th>Trend</th><th>Heat</th><th>Source</th>
          </tr>
        </thead>
        <tbody>
          ${crossMarket.map(row=>{
            const hc = heatClass(row.heat);
            return `
            <tr>
              <td class="mkt-name">${esc(row.market||'')}</td>
              <td>${riskBadge(row.risk)}</td>
              <td class="mkt-driver">${esc(row.driver||'')}${renderTags(row.tags)}</td>
              <td class="move-val">${esc(row.move||'')}</td>
              <td><span class="trend-pill ${trendClass(row.trend)}">${esc(row.trend||'')}</span></td>
              <td>
                <div class="heat-bar">
                  <div class="heat-track"><div class="heat-fill ${hc}" style="width:${clamp(row.heat)}%"></div></div>
                  <span class="heat-num">${esc(row.heat??'')}</span>
                </div>
              </td>
              <td style="color:var(--muted);font-size:11px">${esc(row.source||'')}</td>
            </tr>`;
          }).join('')}
        </tbody>
      </table>
    </div>
  </section>

  <!-- ═══════════ DRIVERS + SECTOR HEAT ═══════════ -->
  <div class="two-col fade-in">
    <section class="panel" id="drivers">
      <div class="sec-head">
        <div>
          <div class="sec-title">Driver Stack</div>
          <div class="sec-sub">Macro and narrative signals pushing cross-asset behavior.</div>
        </div>
      </div>
      ${drivers.map(item=>{
        const prob = signalProb(item.score, item.confidence);
        return `
        <div class="driver-card">
          <div class="driver-head">
            <div>
              <div class="driver-name">${esc(item.name||'')}</div>
              <div class="driver-meta">${esc(item.linked||'')} · Source: ${esc(item.source||'')}</div>
            </div>
            <div style="text-align:right;flex-shrink:0">
              <div class="driver-score">${item.score??''}</div>
              ${confBadge(item.confidence)}
            </div>
          </div>
          <div class="bar-track" style="margin-top:10px">
            <div class="bar-fill" style="width:${clamp(item.score)}%;background:${probColor(prob)}"></div>
          </div>
          <div class="prob-row">
            <span style="color:var(--muted);font-size:11px">Signal probability</span>
            <span class="prob-val" style="color:${probColor(prob)}">${prob}%</span>
          </div>
          <div class="driver-detail">${esc(item.detail||'')}</div>
        </div>`;
      }).join('')}
    </section>

    <section class="panel">
      <div class="sec-head">
        <div>
          <div class="sec-title">Sector Heat Map</div>
          <div class="sec-sub">Momentum and stress clustering across sectors.</div>
        </div>
      </div>
      <div class="sector-grid">
        ${sectorHeat.map(s=>`
          <div class="sector-tile ${sectorClass(s.heat)}">
            <div style="overflow:hidden">
              <span class="sec-heat-num" style="color:${sectorHeatColor(s.heat)}">${s.heat}</span>
              <div class="sec-name">${esc(s.sector)}</div>
              <div class="sec-trend" style="color:${sectorHeatColor(s.heat)}">${esc(s.trend)}</div>
              <div class="sec-driver">${esc(s.driver)}</div>
            </div>
          </div>`).join('')}
      </div>

      <div style="margin-top:24px">
        <div class="sec-head" style="margin-bottom:12px">
          <div class="sec-title" style="font-size:18px">Risk Radar</div>
        </div>
        ${risks.map(r=>`
          <div class="risk-card">
            <div class="risk-head">
              <div class="risk-title">${esc(r.title)}</div>
              ${riskBadge(r.level)}
            </div>
            <div class="risk-desc">${esc(r.desc||r.description||'')}</div>
          </div>`).join('')}
      </div>
    </section>
  </div>

  <!-- ═══════════ SCENARIOS ═══════════ -->
  <section class="panel fade-in" id="scenarios">
    <div class="sec-head">
      <div>
        <div class="sec-title">Scenario Matrix</div>
        <div class="sec-sub">Bull / Base / Bear cases with trigger conditions and probability estimates.</div>
      </div>
    </div>
    <div class="scenario-grid">
      ${scenarios.map(sc=>`
        <div class="scenario-card ${scenClass(sc.label)}">
          <div class="sc-label">${esc(sc.label)} case</div>
          <div class="sc-title">${esc(sc.title)}</div>
          <div class="sc-prob-row">
            <div class="sc-prob">${sc.probability}%</div>
            <div class="sc-prob-label">estimated<br/>probability</div>
          </div>
          <div class="sc-outcome">${esc(sc.outcome)}</div>
          <div class="sc-trigger"><strong>Trigger:</strong> ${esc(sc.trigger)}</div>
        </div>`).join('')}
    </div>
  </section>

  <!-- ═══════════ TIMELINE + WATCHPOINTS ═══════════ -->
  <div class="two-col fade-in" id="watchpoints">
    <section class="panel">
      <div class="sec-head">
        <div>
          <div class="sec-title">Narrative Timeline</div>
          <div class="sec-sub">How the session's market story unfolded.</div>
        </div>
      </div>
      <div class="timeline">
        ${timeline.map((item,i)=>`
          <div class="tl-item">
            <div class="tl-rail">
              <div class="tl-dot"></div>
              ${i<timeline.length-1?'<div class="tl-line"></div>':''}
            </div>
            <div style="padding-bottom:${i<timeline.length-1?'4px':'0'}">
              <div class="tl-time">${esc(item.time||'')}</div>
              <div class="tl-headline">${esc(item.headline||'')}</div>
              <div class="tl-effect">Market effect: ${esc(item.effect||'')}</div>
            </div>
          </div>`).join('')}
      </div>
    </section>

    <section class="panel">
      <div class="sec-head">
        <div>
          <div class="sec-title">Next Watchpoints</div>
          <div class="sec-sub">Forward-looking signals and events to track in the next 24–72 hours.</div>
        </div>
      </div>
      <div class="wp-list">
        ${watchpoints.map(wp=>`
          <div class="wp-item">
            <div class="wp-date">${esc(wp.date||'')}</div>
            <div class="wp-event">${esc(wp.event||'')}</div>
            <span class="wp-tag ${wp.significance==='High'?'wt-high':'wt-med'}">${esc(wp.tag||wp.significance||'')}</span>
          </div>`).join('')}
      </div>
    </section>
  </div>

  <!-- ═══════════ STRATEGY ═══════════ -->
  <section class="panel fade-in" id="strategy">
    <div class="sec-head">
      <div>
        <div class="sec-title">Signal Indicators &amp; Strategy Ideas</div>
        <div class="sec-sub">Illustrative signals derived from the current dashboard state.</div>
      </div>
    </div>
    <div class="strategy-grid">
      ${strategies.map(item=>{
        const prob = signalProb(item.score, item.confidence);
        return `
        <div class="strat-card">
          <div class="strat-head">
            <div class="strat-title">${esc(item.title||'')}</div>
            ${confBadge(item.confidence)}
          </div>
          <div class="strat-body">${esc(item.body||'')}</div>
          <div class="bar-track" style="margin-bottom:8px">
            <div class="bar-fill" style="width:${clamp(prob)}%;background:${probColor(prob)}"></div>
          </div>
          <div class="prob-row" style="margin-top:0">
            <span style="font-size:11px;color:var(--muted)">Signal probability</span>
            <span class="prob-val" style="color:${probColor(prob)};font-size:12px">${prob}%</span>
          </div>
          <div class="strat-trigger"><strong>Signal:</strong> ${esc(item.trigger||'')}</div>
        </div>`;
      }).join('')}
    </div>
    <div class="disclaimer" style="margin-top:16px"><strong>Strategy disclaimer:</strong> These signals are conceptual examples only. Real trading systems require backtesting, live data feeds, position sizing rules, transaction cost modeling, and risk controls.</div>
  </section>

  <!-- ═══════════ SOURCES ═══════════ -->
  <section class="panel fade-in" id="sources">
    <div class="sec-head">
      <div>
        <div class="sec-title">Source References</div>
        <div class="sec-sub">Public sources used to ground the narrative and data snapshot.</div>
      </div>
    </div>
    <div class="src-grid">
      ${sources.map(s=>`
        <div class="src-card">
          <div>
            <div class="src-name">${esc(s.name||'')}</div>
            <div class="src-type">${esc(s.type||'')}</div>
          </div>
          ${s.url?`<a href="${esc(s.url)}" target="_blank" rel="noopener" class="src-link">↗ Open</a>`:''}
        </div>`).join('')}
    </div>
  </section>

  <!-- ═══════════ SANITY ═══════════ -->
  <section class="panel panel-dark fade-in">
    <div class="sec-head">
      <div class="sec-title" style="font-size:16px">Render Checks</div>
      <span class="rbadge ${allOk?'rb-watch':'rb-high'}" style="${allOk?'background:rgba(0,229,160,.1);color:var(--green);border:1px solid rgba(0,229,160,.2)':''}">${allOk?'All passed':'Failures detected'}</span>
    </div>
    <div class="checks-wrap">
      <div class="check-grid">
        ${checks.map(c=>`
          <div class="check-item">
            <div class="check-icon ${c.passed?'ci-ok':'ci-bad'}">${c.passed?'✓':'✗'}</div>
            ${esc(c.label)}
          </div>`).join('')}
      </div>
    </div>
  </section>
  `;

  // Patch stress subtext
  const el = document.getElementById('stress-sub-text');
  if (el) el.textContent = d.macroStressSubtext||'';

  // ── YIELD CURVE CHART ──
  const labels  = rateCurve.map(p => p.tenor);
  const current = rateCurve.map(p => Number(p.current));
  const prior   = rateCurve.map(p => Number(p.prior));

  const ctx = document.getElementById('curveChart');
  if (ctx) {
    new Chart(ctx, {
      type: 'line',
      data: {
        labels,
        datasets: [
          {
            label: 'Prior',
            data: prior,
            borderColor: 'rgba(106,138,173,0.5)',
            backgroundColor: 'transparent',
            borderWidth: 1.5,
            borderDash: [4,4],
            pointRadius: 3,
            pointBackgroundColor: 'rgba(106,138,173,0.5)',
            tension: 0.35,
          },
          {
            label: 'Current',
            data: current,
            borderColor: '#00d4ff',
            backgroundColor: 'rgba(0,212,255,0.05)',
            borderWidth: 2,
            pointRadius: 4,
            pointBackgroundColor: '#00d4ff',
            fill: true,
            tension: 0.35,
          },
        ]
      },
      options: {
        responsive: true,
        animation: { duration: 800, easing: 'easeOutQuart' },
        plugins: {
          legend: { display: false },
          tooltip: {
            backgroundColor: '#0a1624',
            borderColor: 'rgba(255,255,255,0.08)',
            borderWidth: 1,
            titleColor: '#e8f0fe',
            bodyColor: '#6a8aad',
            callbacks: {
              label: ctx => ` ${ctx.dataset.label}: ${ctx.parsed.y.toFixed(2)}%`
            }
          }
        },
        scales: {
          x: {
            grid: { color: 'rgba(255,255,255,0.04)' },
            ticks: { color: '#6a8aad', font: { family: "'DM Mono', monospace", size: 11 } }
          },
          y: {
            grid: { color: 'rgba(255,255,255,0.04)' },
            ticks: {
              color: '#6a8aad',
              font: { family: "'DM Mono', monospace", size: 11 },
              callback: v => v.toFixed(2) + '%'
            }
          }
        }
      }
    });
  }
}

function copyNarrative() {
  fetch('./market_data.json', {cache:'no-store'})
    .then(r=>r.json())
    .then(d=>{
      const text = [
        `MACRO SIGNAL CONSOLE — ${d.snapshotDate}`,
        '',
        d.narrativeSummary||d.marketPulseSubtext||'',
        '',
        'TOP THEMES:',
        ...(d.topThemes||[]).map(t=>`• ${t.theme} [${t.direction}, strength ${t.strength}]`),
        '',
        'KEY RISKS:',
        ...(d.risks||[]).slice(0,3).map(r=>`• [${r.level}] ${r.title}`),
        '',
        'WATCHPOINTS:',
        ...(d.watchpoints||[]).map(w=>`• ${w.date}: ${w.event}`),
      ].join('\n');
      navigator.clipboard.writeText(text).then(()=>{
        const btn = document.getElementById('copy-btn');
        btn.classList.add('copied');
        btn.textContent = '✓ Copied to clipboard';
        setTimeout(()=>{ btn.classList.remove('copied'); btn.innerHTML = '<svg width="12" height="12" viewBox="0 0 16 16" fill="none" stroke="currentColor" stroke-width="1.5"><rect x="5" y="5" width="9" height="9" rx="1.5"/><path d="M3 11H2a1 1 0 01-1-1V2a1 1 0 011-1h8a1 1 0 011 1v1"/></svg> Copy narrative summary'; }, 2500);
      });
    });
}

render().catch(err=>{
  document.getElementById('app').innerHTML = `<section class="panel"><div class="sec-title">Failed to load</div><div class="sec-sub">${esc(String(err))}</div></section>`;
});
</script>
</body>
</html>
